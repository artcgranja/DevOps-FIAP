name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cidades-esg-api
  DOTNET_VERSION: "8.0.x"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

  docker-build-push:
    needs: build-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: meta
        env:
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$REF" = "refs/heads/main" ]; then
            echo "env_tag=prod" >> "$GITHUB_OUTPUT"
          else
            echo "env_tag=staging" >> "$GITHUB_OUTPUT"
          fi
          SHORT_SHA="${SHA:0:7}"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}

  deploy:
    needs: docker-build-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - name: Determine environment
        id: env
        env:
          REF: ${{ github.ref }}
        run: |
          if [ "$REF" = "refs/heads/main" ]; then
            echo "name=prod" >> "$GITHUB_OUTPUT"
            echo "compose=docker-compose.prod.yml" >> "$GITHUB_OUTPUT"
            echo "port=8080" >> "$GITHUB_OUTPUT"
          else
            echo "name=staging" >> "$GITHUB_OUTPUT"
            echo "compose=docker-compose.staging.yml" >> "$GITHUB_OUTPUT"
            echo "port=8081" >> "$GITHUB_OUTPUT"
          fi

      - name: Emit deploy instructions
        env:
          ENV_NAME: ${{ steps.env.outputs.name }}
          COMPOSE_FILE: ${{ steps.env.outputs.compose }}
          PORT: ${{ steps.env.outputs.port }}
          OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
        run: |
          cat > "deploy-instructions-${ENV_NAME}.txt" <<EOF
          Deploy to ${ENV_NAME}:

          export GHCR_OWNER=${OWNER}
          docker login ghcr.io -u ${ACTOR} -p <PAT-with-read:packages>
          docker compose -f ${COMPOSE_FILE} --env-file .env.${ENV_NAME} pull
          docker compose -f ${COMPOSE_FILE} --env-file .env.${ENV_NAME} up -d

          Verify:
            curl http://localhost:${PORT}/health
          EOF

      - name: Upload deploy instructions
        uses: actions/upload-artifact@v4
        with:
          name: deploy-instructions-${{ steps.env.outputs.name }}
          path: deploy-instructions-${{ steps.env.outputs.name }}.txt
